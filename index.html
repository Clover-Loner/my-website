<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Your Website</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #ffffff;
      color: #111;
    }
    header {
      padding: 20px;
      border-bottom: 1px solid #eee;
      display: flex;
      justify-content: space-between;
    }
    section {
      padding: 60px 20px;
      max-width: 1000px;
      margin: auto;
    }
    .hero {
      font-size: 40px;
      font-weight: bold;
    }
    .card {
      border: 1px solid #eee;
      padding: 20px;
      margin-top: 20px;
    }
    .contact {
      background: #111;
      color: white;
      padding: 40px;
      text-align: center;
    }
  </style>
</head>
<body>

<header>
  <h2>Your Domain</h2>
</header>

<section>
  <div class="hero">Put your project on the internet.</div>
  <p>This is your website. You can customise everything here.</p>
</section>

<section>
  <h2>Projects</h2>
  <div class="card">Project One</div>
  <div class="card">Project Two</div>
</section>

<section class="contact">
  <h2>Contact</h2>
  <p>hello@yourdomain.com</p>
</section>

</body>
</html>
